<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spring AI Chat Demo</title>
    <link rel="stylesheet" th:href="@{/styles.css}" href="/styles.css">
</head>
<body>
<main class="app-shell">
    <header class="app-header">
        <h1>Spring AI Chat Demo</h1>
        <p>Ask a question and get a response from the model.</p>
    </header>

    <section id="chatLog" class="chat-log" aria-live="polite" aria-label="Chat messages">
        <article class="message assistant">
            <p>Hi, I am ready. What should we talk about?</p>
        </article>
    </section>

    <form id="chatForm" class="chat-form" autocomplete="off">
        <label for="promptInput" class="sr-only">Message</label>
        <textarea id="promptInput" name="prompt" rows="2" placeholder="Type your message..." required></textarea>
        <div class="chat-actions">
            <button id="sendButton" type="submit">Send</button>
            <span id="statusText" class="status-text" role="status" aria-live="polite"></span>
        </div>
    </form>
</main>

<script th:src="@{/app.js}" src="/app.js" defer></script>
</body>
</html>
